<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>地域名検索</title>
    <link rel="stylesheet" href="./styles.css?v=20260615-2">
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="./app.js?v=20260615-2" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="map-pane" aria-label="日本地図">
        <header class="summary-bar">
          <div>
            <p class="eyebrow">地域名検索</p>
            <h1 id="selectedName">読み込み中</h1>
            <p id="selectedReading" class="reading"></p>
          </div>
          <div class="metrics" aria-label="件数">
            <div>
              <span id="prefCount">0</span>
              <small>都道府県</small>
            </div>
            <div>
              <span id="locationCount">0</span>
              <small>所在地</small>
            </div>
          </div>
        </header>

        <div class="map-stage">
          <div id="geoChart" class="geo-chart" aria-label="該当地域"></div>
          <div id="mapFallback" class="fallback-map" aria-label="該当地域"></div>
        </div>

        <section class="detail-pane" aria-label="地名詳細">
          <div class="detail-head">
            <div id="prefChips" class="pref-chips"></div>
            <div class="source-links">
              <a id="wordLink" href="#" target="_blank" rel="noreferrer">語義</a>
              <a id="literatureLink" href="#" target="_blank" rel="noreferrer">文献</a>
              <a id="researchLink" href="#" target="_blank" rel="noreferrer">論文・研究の索引</a>
              <a id="postalLink" href="#" target="_blank" rel="noreferrer">所在地</a>
            </div>
          </div>
          <p id="meaningText" class="meaning"></p>
          <div id="locationList" class="location-list"></div>
        </section>
      </section>

      <aside class="list-pane" aria-label="地名一覧">
        <div class="search-panel">
          <div class="mode-control" role="group" aria-label="表示種別">
            <button class="mode-button" type="button" data-mode="single">単一名</button>
            <button class="mode-button is-active" type="button" data-mode="multiple">複数名</button>
          </div>
          <label class="search-label" for="searchInput">地名検索</label>
          <input id="searchInput" class="search-input" type="search" autocomplete="off" placeholder="例: 大宮 / 御幸 / あさひ">
          <div class="list-meta">
            <span id="resultCount">0件</span>
            <span id="totalCount">0件中</span>
          </div>
          <label class="range-control" for="rangeSelect">
            <span>表示範囲</span>
            <select id="rangeSelect" class="range-select"></select>
          </label>
        </div>
        <div id="placeList" class="place-list"></div>
      </aside>
    </main>
  </body>
</html>
