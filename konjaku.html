<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <title>今昔マップを開いています</title>
    <style>
      body {
        margin: 0;
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #f7f9fc;
        color: #263241;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      p {
        margin: 0;
        padding: 16px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <p>今昔マップを開いています...</p>
    <script>
      const GSI_GEOCODER_URL = "https://msearch.gsi.go.jp/address-search/AddressSearch";
      const KONJAKU_MAP_URL = "https://ktgis.net/kjmapw/kjmapw.html";

      function konjakuMapUrl(coords) {
        const url = new URL(KONJAKU_MAP_URL);
        if (coords) {
          url.searchParams.set("lat", coords.lat.toFixed(6));
          url.searchParams.set("lng", coords.lng.toFixed(6));
          url.searchParams.set("zoom", "15");
          url.searchParams.set("map2type", "roadmap");
          url.searchParams.set("dual", "true");
        }
        return url.toString();
      }

      function geocoderPriority(title, query) {
        if (title === query) return 0;
        if (title.endsWith(query)) return 1;
        if (title.includes(query)) return 2;
        return 3;
      }

      function pickGeocodeResult(results, query) {
        return results
          .filter((item) => item && item.geometry && Array.isArray(item.geometry.coordinates))
          .sort((a, b) => (
            geocoderPriority((a.properties && a.properties.title) || "", query)
            - geocoderPriority((b.properties && b.properties.title) || "", query)
          ))[0];
      }

      async function geocode(place) {
        const url = new URL(GSI_GEOCODER_URL);
        url.searchParams.set("q", place);
        const response = await fetch(url);
        if (!response.ok) return null;

        const results = await response.json();
        const result = pickGeocodeResult(results, place);
        if (!result) return null;

        const [lng, lat] = result.geometry.coordinates.map(Number);
        return Number.isFinite(lat) && Number.isFinite(lng) ? { lat, lng } : null;
      }

      async function openMap() {
        const place = new URL(window.location.href).searchParams.get("place") || "";
        if (!place) {
          window.location.replace(konjakuMapUrl(null));
          return;
        }

        try {
          window.location.replace(konjakuMapUrl(await geocode(place)));
        } catch (error) {
          window.location.replace(konjakuMapUrl(null));
        }
      }

      openMap();
    </script>
  </body>
</html>
